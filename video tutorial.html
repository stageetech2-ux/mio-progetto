/* Immagine principale */
img {
    display: block;
    margin: 20px auto;
    max-width: 300px;
    border-radius: 15px;
    box-shadow: 0 0 20px #ff6f61;
    transition: transform 0.3s, box-shadow 0.3s;
}

img:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px #ffa07a;
}

/* Menu di navigazione */
nav {
    text-align: center;
    background-color: #2c2c3f;

}

/* Effetto card per contenuti */

/* Stile responsive */
