 <style>

.log-in {
width: 100%;
padding: 10px;
border: solid, 1px, orange;
display: flex;
align-items: center;
}
  /* Sfondo sfumato per tutta la pagina */
  .contenitore {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #89f7fe, #66a6ff);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  /* Header elegante */
  h1 {
    font-size: 3rem;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
    margin-bottom: 20px;
  }

  /* Pulsanti moderni con hover */
  .btn {
    background: rgba(255, 255, 255, 0.2); 
    border: 2px solid #fff;
    color: #fff;
    padding: 10px 25px;
    font-size: 1.1rem;
    border-radius: 25px;
    cursor: pointer;
    margin: 10px;
    transition: all 0.3s ease;
  }

  .btn:hover {
    background: #fff;
    color: #66a6ff;
    transform: scale(1.1);
  }

  /* Piccoli effetti decorativi */
  .decorative-circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    animation: float 8s infinite;
  }

  @keyframes float {
    0% { transform: translateY(0) rotate(0deg);}
    50% { transform: translateY(-30px) rotate(180deg);}
    100% { transform: translateY(0) rotate(360deg);}
  }

  /* Posizioni delle sfere */
  .circle1 { width: 100px; height: 100px; top: 10%; left: 15%; }
  .circle2 { width: 150px; height: 150px; bottom: 20%; right: 10%; }
  .circle3 { width: 80px; height: 80px; top: 50%; left: 70%; }

</style>
