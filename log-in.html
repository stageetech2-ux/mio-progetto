<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="../wow.css">
<meta charset="UTF-8">

<style>

/* Stile generale della pagina */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        /* Contenitore del form */
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            width: 300px;
        }

        /* Titolo */
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        /* Stile input */
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input[type="email"]:focus, input[type="password"]:focus {
            border-color: #2575fc;
            outline: none;
            box-shadow: 0 0 5px rgba(37,117,252,0.5);
        }

        /* Stile link */
        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #2575fc;
            text-decoration: none;
            font-size: 0.9em;
        }

        a:hover {
            text-decoration: underline;
        }
        
        /* Pulsante registrati */
        button {
            width: 100%;
            padding: 12px;
            background-color: #2575fc;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #6a11cb;
        }
     </style>

</head>
<center>
<body>
</center>

<h1>PAGINA PER REGISTRARSI</h1>
<a href="index.html">vai alla pagina home</a>

   <form>
   <label for="e-mail">e-mail:</label><br>
   <input type="text" id="e-mail" name="e-mail"><br>
   <label for="pwd">password</label><br>
   <input type="password" id="pwd" name="pwd">
   </form>
   </center>

</body>
</html>
